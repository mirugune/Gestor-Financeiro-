<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finance Pro</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    background: #0f172a;
    color: #fff;
    font-family: 'Segoe UI', sans-serif;
    padding: 15px;
}

.container {
    max-width: 500px;
    margin: auto;
}

.card {
    background: #1e293b;
    padding: 16px;
    border-radius: 16px;
    margin-bottom: 15px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
}

.cards {
    display: flex;
    gap: 10px;
}

.mini-card {
    flex: 1;
    background: #334155;
    padding: 10px;
    border-radius: 12px;
    text-align: center;
}

input, select, button {
    width: 100%;
    padding: 10px;
    margin-top: 8px;
    border-radius: 10px;
    border: none;
}

button {
    background: #22c55e;
    font-weight: bold;
    cursor: pointer;
}

.green { color: #22c55e; }
.red { color: #ef4444; }

.transaction {
    display: flex;
    justify-content: space-between;
    margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">

<!-- DASHBOARD -->
<div class="card">
    <h2>💳 Finance Pro</h2>
    <h1>R$ <span id="balance">0.00</span></h1>

    <div class="cards">
        <div class="mini-card">
            <p>Receitas</p>
            <strong class="green">R$ <span id="income">0.00</span></strong>
        </div>

        <div class="mini-card">
            <p>Despesas</p>
            <strong class="red">R$ <span id="expense">0.00</span></strong>
        </div>
    </div>
</div>

<!-- GRÁFICO GERAL -->
<div class="card">
    <h3>📊 Visão geral</h3>
    <canvas id="chart"></canvas>
</div>

<!-- GRÁFICO CATEGORIA -->
<div class="card">
    <h3>🥧 Gastos por categoria</h3>
    <canvas id="categoryChart"></canvas>
</div>

<!-- FORM -->
<div class="card">
    <input type="text" id="desc" placeholder="Descrição" oninput="setTodayDate()">

    <select id="type">
        <option value="income">Receita</option>
        <option value="expense">Despesa</option>
    </select>

    <input type="number" id="value" placeholder="Valor" oninput="setTodayDate()">

    <select id="category">
        <option>Alimentação</option>
        <option>Contas</option>
        <option>Bebidas</option>
        <option>Ifood</option>
        <option>Lanches</option>
        <option>Viagem</option>
        <option>Outros</option>
    </select>

    <input type="date" id="date">
    <button onclick="addTransaction()">Adicionar</button>
</div>

<!-- LISTA -->
<div class="card">
    <h3>Transações</h3>
    <div id="list"></div>
</div>

<!-- CTA -->
<div class="card" style="text-align:center;">
    <h3>🚀 Apoie o desenvolvimento</h3>
    <button onclick="apoiarDev()">💳 Apoiar via Pix / Cartão</button>
</div>

</div>

<!-- MODAL HISTÓRICO -->
<div id="modalChart" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); justify-content:center; align-items:center;">
    <div style="background:#1e293b; padding:20px; border-radius:10px; width:90%; max-width:500px;">
        <h3>📊 Histórico</h3>
        <canvas id="historyChart"></canvas>
        <button onclick="closeModal()">Fechar</button>
    </div>
</div>

<script>
let transactions = JSON.parse(localStorage.getItem("transactions")) || [];
let chart;
let categoryChart;
let historyChart;

function setTodayDate() {
    document.getElementById("date").value = new Date().toISOString().split("T")[0];
}

setTodayDate();
render();

function save() {
    localStorage.setItem("transactions", JSON.stringify(transactions));
}

function addTransaction() {
    const desc = document.getElementById("desc").value.trim();
    let value = parseFloat(document.getElementById("value").value);
    const date = document.getElementById("date").value;
    const category = document.getElementById("category").value;
    const type = document.getElementById("type").value;

    if (!desc || !value || !date) return alert("Preencha tudo");

    if (type === "expense") value = -Math.abs(value);
    else value = Math.abs(value);

    const currentMonth = date.slice(0,7);

    const existing = transactions.find(t =>
        t.desc.toLowerCase() === desc.toLowerCase() &&
        t.category === category &&
        t.date.slice(0,7) === currentMonth
    );

    if (existing) {
        existing.value += value;
        existing.date = date;
        if (!existing.history) existing.history = [];
        existing.history.push({ value, date });
    } else {
        transactions.push({
            id: Date.now(),
            desc,
            value,
            date,
            category,
            history: [{ value, date }]
        });
    }

    save();
    document.getElementById("desc").value = "";
    document.getElementById("value").value = "";
    setTodayDate();
    render();
}

function removeTransaction(id) {
    transactions = transactions.filter(t => t.id !== id);
    save();
    render();
}

function render() {
    const list = document.getElementById("list");
    list.innerHTML = "";

    let income = 0;
    let expense = 0;

    const currentMonth = new Date().toISOString().slice(0,7);

    transactions.forEach(t => {

        const div = document.createElement("div");
        div.className = "transaction";

        div.innerHTML = `
            <span>${t.value > 0 ? '💰' : '💸'} ${t.desc}</span>
            <span class="${t.value > 0 ? 'green' : 'red'}">R$ ${t.value.toFixed(2)}</span>
            <button onclick="viewHistory(${t.id})">👁️</button>
            <button onclick="removeTransaction(${t.id})">X</button>
        `;

        list.appendChild(div);

        if (t.value > 0) income += t.value;
        else expense += t.value;
    });

    document.getElementById("income").innerText = income.toFixed(2);
    document.getElementById("expense").innerText = expense.toFixed(2);
    document.getElementById("balance").innerText = (income + expense).toFixed(2);

    updateChart(income, Math.abs(expense));
    updateCategoryChart();
}

function updateChart(income, expense) {
    if (chart) chart.destroy();
    chart = new Chart(document.getElementById("chart"), {
        type: 'doughnut',
        data: {
            labels: ['Receitas', 'Despesas'],
            datasets: [{
                data: [income, expense]
            }]
        }
    });
}

function updateCategoryChart() {
    let categories = {};
    const currentMonth = new Date().toISOString().slice(0,7);

    transactions.forEach(t => {
        if (t.value < 0 && t.date.startsWith(currentMonth)) {
            if (!categories[t.category]) categories[t.category] = 0;
            categories[t.category] += Math.abs(t.value);
        }
    });

    if (categoryChart) categoryChart.destroy();

    categoryChart = new Chart(document.getElementById("categoryChart"), {
        type: 'pie',
        data: {
            labels: Object.keys(categories),
            datasets: [{
                data: Object.values(categories)
            }]
        }
    });
}

function viewHistory(id) {
    const t = transactions.find(t => t.id === id);
    if (!t.history) return;

    document.getElementById("modalChart").style.display = "flex";

    if (historyChart) historyChart.destroy();

    historyChart = new Chart(document.getElementById("historyChart"), {
        type: 'line',
        data: {
            labels: t.history.map(h => h.date),
            datasets: [{
                label: t.desc,
                data: t.history.map(h => h.value)
            }]
        }
    });
}

function closeModal() {
    document.getElementById("modalChart").style.display = "none";
}

function apoiarDev() {
    window.open("https://mpago.la/1Tj9Z68");
}
</script>

</body>
</html>
